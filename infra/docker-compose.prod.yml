# ============================================================
# 艺育皮韵 - Production Docker Compose
# Usage: docker compose -f infra/docker-compose.prod.yml up -d
# ============================================================

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    container_name: lc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-leather_carving}
      POSTGRES_USER: ${DB_USER:-lc_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-lc_user} -d ${DB_NAME:-leather_carving}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lc-network

  # --- Redis Cache / Queue ---
  redis:
    image: redis:7-alpine
    container_name: lc-redis
    restart: unless-stopped
    # Use password if provided, otherwise default config
    command: >
      sh -c 'if [ -n "$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$REDIS_PASSWORD";
      else
        redis-server;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'sh', '-c', 'if [ -n "$REDIS_PASSWORD" ]; then redis-cli -a "$REDIS_PASSWORD" ping; else redis-cli ping; fi']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lc-network

  # --- MinIO Object Storage ---
  minio:
    image: minio/minio:latest
    container_name: lc-minio
    restart: unless-stopped
    ports:
      - '${MINIO_CONSOLE_PORT:-9000}:9000'
      - '${MINIO_API_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lc-network

  # --- Backend API (NestJS) ---
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: lc-api
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      # Override internal service hostnames for container networking
      DATABASE_URL: postgresql://${DB_USER:-lc_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-leather_carving}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - lc-network

  # --- Frontend Web (Next.js) ---
  web:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: lc-web
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api:3001/api/v1}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://api:3001}
    depends_on:
      - api
    networks:
      - lc-network

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: lc-nginx
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment when SSL certs are available:
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    networks:
      - lc-network

# --- Named Volumes ---
volumes:
  pgdata:
    name: lc-pgdata
  redisdata:
    name: lc-redisdata
  miniodata:
    name: lc-miniodata

# --- Network ---
networks:
  lc-network:
    driver: bridge
