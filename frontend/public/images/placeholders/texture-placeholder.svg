<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.06" intercept="0.92"/>
        <feFuncG type="linear" slope="0.06" intercept="0.89"/>
        <feFuncB type="linear" slope="0.06" intercept="0.84"/>
        <feFuncA type="linear" slope="0.15" intercept="0"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#EDE3D5"/>
  <rect width="200" height="200" filter="url(#noise)" opacity="0.4"/>
</svg>
